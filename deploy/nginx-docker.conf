upstream rakshagis {
    server web:8000 fail_timeout=0;
}

upstream pg_tileserv {
    server pg_tileserv:7800 fail_timeout=0;
}

# HTTP — redirect to HTTPS (or serve directly when HTTPS is not configured)
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # In production with HTTPS enabled, redirect all HTTP → HTTPS.
    # Comment out this block if you are running HTTP-only (development/LAN).
    # Uncomment and set your domain:
    #   return 301 https://$host$request_uri;

    client_max_body_size 500M;
    keepalive_timeout 65;

    # Static files — served directly, 30-day immutable cache
    location /static/ {
        alias /staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files — user uploads, 7-day cache
    location /media/ {
        alias /media/;
        expires 7d;
    }

    # Vector tile server (pg_tileserv)
    location /tiles/ {
        proxy_pass http://pg_tileserv/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        # Cache tile responses for 10 minutes
        proxy_cache_valid 200 10m;
    }

    # API + everything else → Gunicorn
    location / {
        proxy_pass http://rakshagis;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}


upstream rakshagis {
    server web:8000 fail_timeout=0;
}

upstream onlyoffice {
    server onlyoffice:80;
}

upstream pg_tileserv {
    server pg_tileserv:7800 fail_timeout=0;
}

# osm_tiles upstream is intentionally absent — it is an optional service
# started only after --import-osm.  The location block below uses the Docker
# internal resolver (127.0.0.11) with a variable so nginx does NOT resolve the
# hostname at startup and won't refuse to start when the service is offline.

# HTTP — redirect to HTTPS (or serve directly when HTTPS is not configured)
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # In production with HTTPS enabled, redirect all HTTP → HTTPS.
    # Comment out this block if you are running HTTP-only (development/LAN).
    # Uncomment and set your domain:
    #   return 301 https://$host$request_uri;

    client_max_body_size 500M;
    keepalive_timeout 65;

    # Static files — served directly, 30-day immutable cache
    location /static/ {
        alias /staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files — user uploads, 7-day cache
    location /media/ {
        alias /media/;
        expires 7d;
    }

    # Vector tile server (pg_tileserv — custom PostGIS layers)
    location /tiles/ {
        proxy_pass http://pg_tileserv/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_cache_valid 200 10m;
    }

    # Local OSM raster tile server (offline base map — India)
    # Tile URL used in the app: /osm-tiles/{z}/{x}/{y}.png
    # Uses Docker's internal resolver so nginx starts even when osm-tiles is
    # not running (it's in the "osm" compose profile, started after --import-osm).
    location /osm-tiles/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $osm_upstream http://osm-tiles;
        proxy_pass $osm_upstream/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        # Tile responses are immutable — cache aggressively
        add_header Cache-Control "public, max-age=604800, immutable";
        expires 7d;
    }

    # WebSocket — real-time collaboration (Django Channels / Daphne)
    location /ws/ {
        proxy_pass http://rakshagis;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;   # 24 h — WebSocket is long-lived
        proxy_send_timeout 86400s;
    }

    # Local quantized-mesh terrain tile server (optional — profile: terrain)
    # Tile URL: /terrain-tiles/tilesets/terrain/{z}/{x}/{y}.terrain
    # Uses resolver so nginx starts even when terrain-server is not running.
    location /terrain-tiles/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $terrain_upstream http://terrain-server:8765;
        # proxy_pass with a VARIABLE does not rewrite the URI — without this
        # rewrite every request is forwarded as "/" and Cesium receives the
        # directory index instead of layer.json/tiles (terrain renders flat).
        rewrite ^/terrain-tiles/(.*)$ /$1 break;
        proxy_pass $terrain_upstream;
        proxy_set_header Host $http_host;
        proxy_read_timeout 30s;
        add_header Cache-Control "public, max-age=604800, immutable";
        add_header Access-Control-Allow-Origin *;
    }

    # OnlyOffice Community Document Server — local only, JWT-protected
    location /onlyoffice/ {
        proxy_pass http://onlyoffice/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host/onlyoffice;
        # WebSocket support for real-time collaborative editing
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 100m;
    }

    # API + everything else → Gunicorn
    # OnlyOffice callback endpoint: clear Authorization to avoid DRF/SimpleJWT
    # attempting to authenticate the Bearer token (OnlyOffice sends its own
    # callback JWT in the POST body). This location must appear before the
    # generic `location /` block so it matches first.
    location ~ ^/api/documents/\d+/onlyoffice-callback/ {
        proxy_pass http://rakshagis;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "";
        proxy_redirect off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        proxy_pass http://rakshagis;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}


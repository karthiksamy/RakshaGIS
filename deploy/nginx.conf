upstream rakshagis_gunicorn {
    server unix:/run/rakshagis/gunicorn.sock fail_timeout=0;
}

server {
    listen 80;
    server_name _;          # Replace _ with your server IP or domain

    client_max_body_size 100M;
    keepalive_timeout 65;

    # Static files served directly by Nginx
    location /static/ {
        alias /opt/rakshagis/RakshaGIS/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files (uploaded documents, etc.)
    location /media/ {
        alias /opt/rakshagis/RakshaGIS/media/;
        expires 7d;
    }

    # All other requests go to Gunicorn
    location / {
        proxy_pass http://rakshagis_gunicorn;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 120s;
    }
}
